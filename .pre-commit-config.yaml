# Pre-commit hooks for Autocoin
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -x -q --tb=short
        language: system
        pass_filenames: false

      - id: py-compile-critical
        name: py-compile critical files
        entry: python -c "import py_compile; [py_compile.compile(f, doraise=True) for f in ['app/core/hyper_system.py', 'app/manager/reserved_selector.py', 'app/strategy/strategy_plugins.py']]"
        language: system
        pass_filenames: false
